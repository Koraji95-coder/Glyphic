# Place at: .github/workflows/copilot-setup-steps.yml
#
# This workflow runs BEFORE the Copilot coding agent's firewall turns on,
# so it can download anything it needs without hitting allowlist blocks.
# Once this is in place you can remove the custom allowlist entirely.

name: Copilot Setup Steps

on:
  workflow_dispatch:
  workflow_call:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The dl.google.com block came from the preinstalled Chrome apt repo.
      # Strip it (and Microsoft's, which has bitten other Tauri projects)
      # before any apt-get update runs.
      - name: Remove third-party apt repos
        run: |
          sudo rm -f /etc/apt/sources.list.d/google-chrome.list
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list

      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libssl-dev \
            build-essential \
            pkg-config \
            curl wget file

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Pre-fetch Cargo dependencies
        working-directory: src-tauri
        run: cargo fetch

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python sidecar dependencies
        shell: bash
        run: |
          # Root-level requirements, if any
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          # Per-sidecar requirements — adjust the glob if your sidecars
          # live somewhere other than src-tauri/binaries/.
          shopt -s nullglob
          for f in src-tauri/binaries/*/requirements.txt; do
            echo "Installing from $f"
            pip install -r "$f"
          done
